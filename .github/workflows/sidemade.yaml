name: SIDEMADE CI/CD

on: [push]

jobs:
  style_check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends clang-format
          
      - name: Run style check

        run: clang-format -i src/*.cpp src/*.hpp tests/*.cpp --dry-run -Werror

  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        mode: [Release, Debug]
        compiler: [gcc, clang]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up cache key
        id: cache-key
        run: echo "CACHE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*
          key: ${{ runner.os }}-apt-${{ env.CACHE_DATE }}
          restore-keys: ${{ runner.os }}-apt-
          save-always: true

      - name: Update and install packages
        run: |
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends cmake g++ clang libeigen3-dev libboost-all-dev libyaml-cpp-dev &&
          sudo apt-get clean

      - name: Build
        run: 
          mkdir build && 
          cd build && 
          cmake -DCMAKE_C_COMPILER=${{ matrix.compiler }} 
                -DCMAKE_CXX_COMPILER=$(if [ "${{ matrix.compiler }}" == "gcc" ]; then echo "g++"; else echo "clang++"; fi) 
                -DCMAKE_BUILD_TYPE=${{ matrix.mode }} .. && 
          make -j4

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.mode }}-${{ matrix.compiler }}
          path: build/*
          retention-days: 1
          if-no-files-found: error

  tests:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        mode: [Release, Debug]
        compiler: [gcc, clang]

    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*
          key: ${{ runner.os }}-apt-${{ env.CACHE_DATE }}
          restore-keys: ${{ runner.os }}-apt-

      - name: Update and install packages
        run: |
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends cmake g++ clang libeigen3-dev libboost-all-dev libyaml-cpp-dev &&
          sudo apt-get clean

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.mode }}-${{ matrix.compiler }}
          path: build/

      - name: Run tests
        run: |
          cd build && 
          chmod +x testsidemade sidemade &&
          ctest -j4
