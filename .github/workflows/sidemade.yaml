name: SIDEMADE CI/CD

on: [push]

jobs:
  style_check:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Run style check
        run: clang-format -i src/*.cpp src/*.hpp tests/*.cpp --dry-run -Werror

  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libeigen3-dev libyaml-cpp-dev
      - name: Build
        run: mkdir build && cd build && cmake .. && make -j4

  tests:
    runs-on: ubuntu-24.04

    steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Install dependencies
          run: sudo apt-get update && sudo apt-get install -y build-essential cmake libeigen3-dev libboost-all-dev libyaml-cpp-dev
        - name: Build and run tests
          run: mkdir build && cd build && cmake .. && make -j4 && make test
